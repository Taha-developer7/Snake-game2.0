<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON SERPENT // 3D AAA SNAKE</title>
    <!-- Tailwind for quick premium layouts + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Include CDN core stack securely -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white overflow-hidden select-none w-screen h-screen dynamic-font">

    <!-- WebGL WebGL Canvas Engine -->
    <canvas id="webgl-canvas" class="absolute inset-0 w-full h-full z-0"></canvas>

    <!-- UI Overlay System -->
    <div id="ui-container" class="absolute inset-0 z-10 flex flex-col justify-between pointer-events-none p-6">
        
        <!-- HUD / Top Bar -->
        <header class="w-full flex justify-between items-center ready-fade">
            <div class="glass-panel p-4 flex gap-6 items-center pointer-events-auto">
                <div>
                    <div class="text-xs tracking-widest text-cyan-400 font-bold uppercase">Score</div>
                    <div id="score-val" class="text-3xl font-black font-orbitron text-white">0000</div>
                </div>
                <div class="border-l border-white/10 pl-6">
                    <div class="text-xs tracking-widest text-pink-500 font-bold uppercase">Combo</div>
                    <div id="combo-val" class="text-3xl font-black font-orbitron text-pink-500">x1.0</div>
                </div>
            </div>
            
            <div class="glass-panel p-4 text-right pointer-events-auto">
                <div class="text-xs tracking-widest text-slate-400 uppercase">High Score</div>
                <div id="highscore-val" class="text-xl font-bold font-orbitron text-yellow-400">0000</div>
            </div>
        </header>

        <!-- Virtual Joystick Controls Overlay for Mobile -->
        <div id="joystick-zone" class="absolute bottom-10 left-10 w-32 h-32 rounded-full border border-cyan-500/30 bg-cyan-950/10 backdrop-blur-sm hidden pointer-events-auto flex items-center justify-center">
            <div id="joystick-knob" class="w-12 h-12 rounded-full bg-cyan-400 shadow-[0_0_15px_#00f3ff] transition-transform duration-75"></div>
        </div>

        <!-- Right Side Interactive Panel -->
        <div class="absolute top-24 right-6 flex flex-col gap-3 pointer-events-auto">
            <button id="btn-pause" class="glass-panel px-4 py-2 hover:bg-white/10 active:scale-95 transition text-xs tracking-wider uppercase font-bold text-cyan-400">Pause</button>
        </div>
    </div>

    <!-- Screen State Managers (Menus) -->
    <div id="screen-overlay" class="absolute inset-0 z-20 flex items-center justify-center bg-black/60 backdrop-blur-md transition-all duration-500">
        
        <!-- Main Menu -->
        <div id="menu-main" class="glass-card max-w-md w-full p-8 text-center flex flex-col gap-6 scale-95 opacity-0 pointer-events-none hidden-state">
            <h1 class="text-4xl font-black font-orbitron tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-fuchsia-500 to-indigo-500 dropping-glow">
                NEON SERPENT
            </h1>
            <p class="text-sm font-rajdhani text-slate-400 tracking-wide">A highly optimized hyper-casual 3D sensory experience.</p>
            
            <div class="flex flex-col gap-2 text-left">
                <label class="text-xs uppercase text-cyan-400 font-bold tracking-widest mb-1">Select Difficulty</label>
                <div class="grid grid-cols-3 gap-2">
                    <button class="btn-diff active" data-speed="200">Casual</button>
                    <button class="btn-diff" data-speed="130">Neon</button>
                    <button class="btn-diff" data-speed="80">Psycho</button>
                </div>
            </div>

            <button id="btn-start" class="w-full py-4 rounded bg-gradient-to-r from-cyan-500 to-blue-600 font-orbitron font-bold text-lg tracking-widest shadow-[0_0_25px_rgba(6,182,212,0.5)] hover:shadow-[0_0_40px_rgba(6,182,212,0.8)] transition transform active:scale-95 pointer-events-auto">
                INITIALIZE GAME
            </button>
        </div>

        <!-- Pause Screen -->
        <div id="menu-pause" class="glass-card max-w-xs w-full p-8 text-center flex flex-col gap-4 scale-95 opacity-0 pointer-events-none hidden-state hidden">
            <h2 class="text-2xl font-bold font-orbitron tracking-widest text-cyan-400">PAUSED</h2>
            <button id="btn-resume" class="w-full py-3 rounded bg-white/10 hover:bg-white/20 transition font-bold tracking-wider text-sm">RESUME</button>
            <button id="btn-quit" class="w-full py-3 rounded bg-red-950/30 border border-red-500/30 text-red-400 hover:bg-red-900/40 transition font-bold tracking-wider text-sm">ABANDON</button>
        </div>

        <!-- Game Over Screen -->
        <div id="menu-gameover" class="glass-card max-w-md w-full p-8 text-center flex flex-col gap-6 scale-95 opacity-0 pointer-events-none hidden-state hidden">
            <h2 class="text-3xl font-black font-orbitron tracking-widest text-pink-500 dynamic-pulse">SYSTEM CRASH</h2>
            <div class="bg-black/40 rounded p-4 border border-white/5 flex justify-around">
                <div>
                    <div class="text-xs text-slate-400 uppercase">Final Score</div>
                    <div id="final-score" class="text-2xl font-bold font-orbitron text-white">0</div>
                </div>
                <div class="border-l border-white/10"></div>
                <div>
                    <div class="text-xs text-slate-400 uppercase">Max Combo</div>
                    <div id="final-combo" class="text-2xl font-bold font-orbitron text-pink-400">x1.0</div>
                </div>
            </div>
            <button id="btn-restart" class="w-full py-4 rounded bg-gradient-to-r from-pink-500 to-fuchsia-600 font-orbitron font-bold text-lg tracking-widest shadow-[0_0_25px_rgba(236,72,153,0.5)] hover:shadow-[0_0_40px_rgba(236,72,153,0.8)] transition transform active:scale-95 pointer-events-auto">
                REBOOT SYSTEM
            </button>
        </div>
    </div>

    <!-- Audio Web API Integration Layer -->
    <script src="audio.js"></script>
    <!-- Core Application Modular Manifest -->
    <script src="particles.js"></script>
    <script src="food.js"></script>
    <script src="snake.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
